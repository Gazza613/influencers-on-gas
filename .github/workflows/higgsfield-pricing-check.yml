name: Higgsfield pricing watch

# Weekly cloud check (runs on GitHub's servers — no dependence on anyone's PC).
# Detects when Higgsfield's pricing page changes and opens an issue so the
# credit table in lib/usage.js can be reviewed. Never edits pricing automatically.

on:
  schedule:
    - cron: '13 9 * * 1'   # Mondays 09:13 UTC
  workflow_dispatch: {}     # allows manual "Run workflow" on demand

permissions:
  contents: write   # commit the updated pricing snapshot
  issues: write     # open an issue when pricing changes

concurrency:
  group: higgsfield-pricing
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check Higgsfield pricing
        id: check
        run: node scripts/check-higgsfield-pricing.mjs

      - name: Commit updated snapshot
        if: always()
        run: |
          if [ -n "$(git status --porcelain .github/pricing-snapshot)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .github/pricing-snapshot
            git commit -m "chore: update Higgsfield pricing snapshot [skip ci]"
            git push
          fi

      - name: Open issue on change
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create higgsfield-pricing --color FBCA04 --description "Higgsfield pricing drift" 2>/dev/null || true
          gh issue create \
            --title "Higgsfield pricing changed — review credit table" \
            --label higgsfield-pricing \
            --body-file pricing-change-body.md
